<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>אוזן קשבת</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.10/dist/livekit-client.umd.min.js"></script>
</head>
<body>
  <main class="app">

    <!-- Idle screen: big call button -->
    <section id="idle" class="screen active">
      <div class="hero">
        <h1 class="title">אוזן קשבת</h1>
        <p class="subtitle">מקום בטוח לדבר. אין מה למהר.</p>
      </div>

      <button id="callBtn" class="call-btn" aria-label="התחל שיחה">
        <span class="call-btn__inner">
          <svg viewBox="0 0 24 24" width="44" height="44" aria-hidden="true">
            <path fill="currentColor" d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.05-.24c1.12.37 2.32.57 3.55.57a1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.23.2 2.43.57 3.55a1 1 0 01-.24 1.05l-2.21 2.19z"/>
          </svg>
        </span>
        <span class="call-btn__label">לחץ כדי להתחיל לדבר</span>
      </button>

      <p class="disclaimer">
        מערכת זו אינה תחליף לטיפול רפואי או נפשי.<br/>
        במצוקה אקוטית: ער"ן <strong>1201</strong> · נט"ל <strong>1-800-363-363</strong>
      </p>
    </section>

    <!-- Active call screen -->
    <section id="call" class="screen">
      <div class="status">
        <div id="statusDot" class="status-dot listening"></div>
        <div id="statusText" class="status-text">מקשיב...</div>
      </div>

      <canvas id="visualizer" class="visualizer"></canvas>

      <div id="timer" class="timer">00:00</div>

      <button id="hangupBtn" class="hangup-btn" aria-label="סיים שיחה">
        <svg viewBox="0 0 24 24" width="32" height="32" aria-hidden="true">
          <path fill="currentColor" d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28a1 1 0 01-.7-.29L.29 13.08a.996.996 0 010-1.41C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .27-.11.52-.29.7l-2.48 2.48c-.18.18-.43.29-.7.29-.27 0-.52-.11-.7-.28a11.27 11.27 0 00-2.67-1.85c-.33-.16-.56-.5-.56-.9v-3.1A16.06 16.06 0 0012 9z"/>
        </svg>
      </button>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
